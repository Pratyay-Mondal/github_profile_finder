<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Profile Finder</title>
  <meta name="description" content="Search any GitHub username and instantly view their profile, stats, and top repositories." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
        </svg>
        <span>GitHub Profile Finder</span>
      </div>
      <p class="subtitle">Search any GitHub username to explore their profile & repositories</p>
    </header>

    <!-- Search -->
    <section class="search-section" aria-label="Search GitHub user">
      <form id="searchForm" class="search-form" autocomplete="off">
        <div class="search-input-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            id="usernameInput"
            type="text"
            class="search-input"
            placeholder="Enter GitHub username…"
            aria-label="GitHub username"
            spellcheck="false"
          />
        </div>
        <button id="searchBtn" type="submit" class="search-btn" aria-label="Search">
          <span class="btn-label">Search</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>
    </section>

    <!-- Loading -->
    <div id="loadingState" class="loading-state hidden" aria-live="polite">
      <div class="spinner"></div>
      <p>Fetching profile…</p>
    </div>

    <!-- Error -->
    <div id="errorState" class="error-state hidden" role="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p id="errorMsg">Something went wrong.</p>
    </div>

    <!-- Profile Card -->
    <section id="profileSection" class="profile-section hidden" aria-label="GitHub profile">
      <div class="profile-card glass">
        <div class="profile-top">
          <div class="avatar-wrap">
            <img id="avatar" src="" alt="GitHub avatar" class="avatar" />
            <div class="avatar-ring"></div>
          </div>
          <div class="profile-info">
            <h1 id="profileName" class="profile-name"></h1>
            <a id="profileLogin" href="#" target="_blank" rel="noopener" class="profile-login"></a>
            <p id="profileBio" class="profile-bio"></p>
            <div class="profile-meta">
              <span id="profileLocation" class="meta-item hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="locationText"></span>
              </span>
              <span id="profileCompany" class="meta-item hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 21h18M9 21V7l7-4v18M9 12h7"/></svg>
                <span id="companyText"></span>
              </span>
              <span id="profileBlog" class="meta-item hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                <a id="blogLink" href="#" target="_blank" rel="noopener" class="blog-link"></a>
              </span>
              <span id="profileJoined" class="meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span id="joinedText"></span>
              </span>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="statRepos">0</span>
            <span class="stat-label">Repositories</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statFollowers">0</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statFollowing">0</span>
            <span class="stat-label">Following</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="statGists">0</span>
            <span class="stat-label">Gists</span>
          </div>
        </div>

        <a id="profileGithubLink" href="#" target="_blank" rel="noopener" class="view-profile-btn">
          View on GitHub
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>

      <!-- Repos -->
      <div class="repos-section">
        <h2 class="repos-heading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Top Repositories
        </h2>
        <div id="reposGrid" class="repos-grid"></div>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
